<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RedFlagCheck — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0b0d14;
            --surface: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.09);
            --accent: #e63946;
            --text: #f0f0f5;
            --muted: #8a8fa8;
            --radius: 14px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: grid;
            place-items: center;
            background-image:
                radial-gradient(ellipse at 20% 20%, rgba(230, 57, 70, 0.14) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(244, 162, 97, 0.08) 0%, transparent 50%);
        }

        .login-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 48px 40px;
            width: 100%;
            max-width: 400px;
            backdrop-filter: blur(20px);
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.5);
            animation: fadeUp 0.4s ease;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px;
            justify-content: center;
        }

        .brand-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: linear-gradient(135deg, #e63946, #f4a261);
            display: grid;
            place-items: center;
            font-size: 1.2rem;
            color: white;
        }

        .brand h1 {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: -0.4px;
        }

        .brand h1 span {
            color: var(--accent);
        }

        .subtitle {
            text-align: center;
            color: var(--muted);
            font-size: 0.88rem;
            margin-top: -20px;
            margin-bottom: 32px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 7px;
            margin-bottom: 18px;
        }

        .field label {
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap i {
            position: absolute;
            left: 13px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            font-size: 0.9rem;
        }

        .field input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 14px 12px 38px;
            color: var(--text);
            font-family: inherit;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .field input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(230, 57, 70, 0.15);
        }

        .error-msg {
            background: rgba(230, 57, 70, 0.12);
            border: 1px solid rgba(230, 57, 70, 0.3);
            border-radius: 9px;
            padding: 10px 14px;
            font-size: 0.85rem;
            color: #ff6b6b;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-login {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #e63946, #c1121f);
            border: none;
            border-radius: 10px;
            color: white;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 20px rgba(230, 57, 70, 0.3);
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(230, 57, 70, 0.45);
        }

        .btn-login:active {
            transform: translateY(0);
        }
    </style>
</head>

<body>
    <div class="login-box">
        <div class="brand">
            <div class="brand-icon"><i class="fa-solid fa-flag"></i></div>
            <h1>Red<span>Flag</span>Check</h1>
        </div>
        <p class="subtitle">Sign in to access the database</p>

        <form method="POST" action="/login">
            <div class="field">
                <label>Username</label>
                <div class="input-wrap">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" name="username" placeholder="Enter username" required autofocus />
                </div>
            </div>
            <div class="field">
                <label>Password</label>
                <div class="input-wrap">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" name="password" placeholder="Enter password" required />
                </div>
            </div>

            <script>
                if (window.location.search.includes('error=1')) {
                    document.write('<div class="error-msg"><i class="fa-solid fa-circle-exclamation"></i> Invalid username or password.</div>');
                }
            </script>

            <button type="submit" class="btn-login">
                <i class="fa-solid fa-right-to-bracket"></i> Sign In
            </button>
        </form>
    </div>
</body>

</html>
